<!DOCTYPE html>
<html>
<head>
  <title>Bus Live Location</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    #map { height: 100vh; width: 100%; } /* Full screen map */
  </style>
</head>
<body>

<div id="map" style="height: 100vh; width: 100%;"></div>

<script>
  const map = L.map("map").setView([12.9716, 77.5946], 13);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19
  }).addTo(map);

  let marker = null;


<!-- Leaflet JS -->  </script>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
async function fetchLiveLocation() {
    try {
        const urlParams = new URLSearchParams(window.location.search);
        const busId = urlParams.get("bus") || 6;

        const response = await fetch(`/api/get_live_location?bus_id=${busId}`);
        const data = await response.json();

        // FIX: use keys sent by backend


        const bus = data.buses.find(b => b.bus_number === "Bus6");
if (!bus) return;
       const lat = parseFloat(data.buses[0].lat);
      const lng = parseFloat(data.buses[0].lng);


        if (!marker) {
            marker = L.marker([lat, lng]).addTo(map)
                       .bindPopup("Bus is here")
                       .openPopup();
            map.setView([lat, lng], 15);
        } else {
            marker.setLatLng([lat, lng]);
            map.panTo([lat, lng]);
        }
    } catch (err) {
        console.error("Error fetching location:", err);
    }
}


// Fetch location every 5 seconds
setInterval(fetchLiveLocation, 5000);

// Fetch immediately on load
fetchLiveLocation();
</Script>
</body>
</html>
