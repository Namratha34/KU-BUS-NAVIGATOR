<!DOCTYPE html>
<html>
<head>
  <title>Bus Live Location</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    #map {
      height: 100vh;
      width: 100%;
    }
  </style>
</head>
<body>

<div id="map"></div>

<!-- ✅ Leaflet JS MUST come BEFORE using L -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  // Initialize map
  const map = L.map("map").setView([12.9716, 77.5946], 13);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19
  }).addTo(map);

  let marker = null;

  async function fetchLiveLocation() {
    try {
      const urlParams = new URLSearchParams(window.location.search);
      const busId = urlParams.get("bus") || 1;

      const response = await fetch(`/api/get_live_location?bus_id=${busId}`);
      const data = await response.json();

      console.log("LIVE DATA:", data); // DEBUG

      if (!data.success || !data.buses.length) return;

      const bus = data.buses[0];

      const lat = parseFloat(bus.latitude);
      const lng = parseFloat(bus.longitude);

      if (!lat || !lng) {
        console.log("Waiting for live data...");
        return;
      }

      if (!marker) {
        marker = L.marker([lat, lng])
          .addTo(map)
          .bindPopup("Bus is here")
          .openPopup();

        map.setView([lat, lng], 15);
      } else {
        marker.setLatLng([lat, lng]);
        map.panTo([lat, lng]);
      }

    } catch (err) {
      console.error("Error fetching location:", err);
    }
  }

  // Run every 5 sec
  setInterval(fetchLiveLocation, 5000);

  // Run immediately
  fetchLiveLocation();
</script>

</body>
</html>
